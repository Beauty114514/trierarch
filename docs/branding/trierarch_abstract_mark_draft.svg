<?xml version="1.0" encoding="UTF-8"?>
<!--
  Black background, flat blue triangle (#2F6FCC). Robot = luminance-mask cutout; eyes/mouth = white punches (blue on screen).
  Larger head, neck pinch lower. Left: >_ (underscore centered to CPU outer cy). Right: CPU only.
  Mouth: smooth sinusoid, two periods: y = 97.0 − 2.75·cos(4π(x−50)/28).
  Ears: flat crown; left = 10‑tooth gear with hub hole; right = multi‑curve antenna (stroke). Bottom: two arm triangles (very wide base on body, sharp outward tip).
  Companion: trierarch_abstract_mark_foreground.svg — same mask/artwork, no black rect (Android adaptive-icon foreground export).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="512" height="512">
  <defs>
    <mask id="robotCut" maskUnits="userSpaceOnUse" maskContentUnits="userSpaceOnUse" x="0" y="0" width="128" height="128">
      <rect width="128" height="128" fill="white"/>
      <!-- Robot silhouette + ears (all black = one combined cutout; union in mask) -->
      <path fill="black"
            d="M 44 100
               L 44 92.5
               C 44 83.5, 49.5 77, 57 76
               C 60 76, 68 76, 72 76
               C 78.5 77, 84 83.5, 84 92.5
               L 84 100
               Z"/>
      <!-- Left ear: full gear below face punches (y &lt; ~80) so outline stays fully visible; tiny gap to head -->
      <path fill="black"
            d="M 49.25 77.30
               L 48.20 79.11
               L 46.36 78.52
               L 46.58 76.43
               L 44.66 77.28
               L 43.52 75.71
               L 44.92 74.16
               L 42.87 73.72
               L 42.87 71.78
               L 44.92 71.34
               L 43.52 69.79
               L 44.66 68.22
               L 46.58 69.07
               L 46.36 66.98
               L 48.20 66.39
               L 49.25 68.20
               L 50.30 66.39
               L 52.14 66.98
               L 51.92 69.07
               L 53.84 68.22
               L 54.98 69.79
               L 53.58 71.34
               L 55.63 71.78
               L 55.63 73.72
               L 53.58 74.16
               L 54.98 75.71
               L 53.84 77.28
               L 51.92 76.43
               L 52.14 78.52
               L 50.30 79.11
               Z"/>
      <!-- Right ear: antenna (curved stroke) -->
      <path fill="none" stroke="black" stroke-width="2.35" stroke-linecap="round" stroke-linejoin="round"
            d="M 72.0 76.0
               C 73.0 67.0, 75.4 57.0, 74.2 48.0
               C 73.0 42.5, 66.0 38.0, 60.5 35.6
               C 59.8 35.1, 59.35 34.65, 59.1305 34.28"/>
      <!-- Hands: long triangles, very wide base on body, sharp tip -->
      <path fill="black"
            d="M 49.5 100.0
               L 40.5 98.60
               L 32.35 92.35
               Z"/>
      <path fill="black"
            d="M 78.5 100.0
               L 87.5 98.60
               L 95.65 92.35
               Z"/>
      <!-- White punches triangle back in for facial features + gear hub hole -->
      <g fill="white" stroke="white">
        <circle cx="49.25" cy="72.75" r="2.2" fill="white" stroke="none"/>
        <!-- CPU outer cy = 86.8 → underscore rect y = 86.275 -->
        <path d="M 49.5 80.8 L 53.2 83.8 L 49.5 85.5 Z"/>
        <rect x="53.8" y="86.275" width="4.8" height="1.05" rx="0.25"/>
        <!-- CPU -->
        <rect x="65.2" y="81.8" width="13" height="10" rx="1.15" fill="none" stroke-width="1.35"/>
        <line x1="67.8" y1="81.8" x2="67.8" y2="79.8" stroke-width="1.15" stroke-linecap="round"/>
        <line x1="71.7" y1="81.8" x2="71.7" y2="79.8" stroke-width="1.15" stroke-linecap="round"/>
        <line x1="75.6" y1="81.8" x2="75.6" y2="79.8" stroke-width="1.15" stroke-linecap="round"/>
        <line x1="67.8" y1="91.8" x2="67.8" y2="93.6" stroke-width="1.15" stroke-linecap="round"/>
        <line x1="71.7" y1="91.8" x2="71.7" y2="93.6" stroke-width="1.15" stroke-linecap="round"/>
        <line x1="75.6" y1="91.8" x2="75.6" y2="93.6" stroke-width="1.15" stroke-linecap="round"/>
        <rect x="67.4" y="83.8" width="8.6" height="6" rx="0.5" fill="none" stroke-width="0.9"/>
        <!-- Mouth: two cycles of cosine (phase-shifted sine), same amplitude -->
        <path fill="none" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"
              d="M 50.00 94.25 L 50.64 94.36 L 51.27 94.69 L 51.91 95.20 L 52.55 95.86 L 53.18 96.61 L 53.82 97.39 L 54.45 98.14 L 55.09 98.80 L 55.73 99.31 L 56.36 99.64 L 57.00 99.75 L 57.64 99.64 L 58.27 99.31 L 58.91 98.80 L 59.55 98.14 L 60.18 97.39 L 60.82 96.61 L 61.45 95.86 L 62.09 95.20 L 62.73 94.69 L 63.36 94.36 L 64.00 94.25 L 64.64 94.36 L 65.27 94.69 L 65.91 95.20 L 66.55 95.86 L 67.18 96.61 L 67.82 97.39 L 68.45 98.14 L 69.09 98.80 L 69.73 99.31 L 70.36 99.64 L 71.00 99.75 L 71.64 99.64 L 72.27 99.31 L 72.91 98.80 L 73.55 98.14 L 74.18 97.39 L 74.82 96.61 L 75.45 95.86 L 76.09 95.20 L 76.73 94.69 L 77.36 94.36 L 78.00 94.25"/>
      </g>
    </mask>
  </defs>

  <rect width="128" height="128" fill="#000000"/>

  <path fill="#2F6FCC" mask="url(#robotCut)" d="M 64 24 L 100 100 L 28 100 Z"/>
</svg>
